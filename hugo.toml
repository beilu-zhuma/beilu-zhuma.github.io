baseURL = 'https://zhuma9527.com/'
locale = 'zh-cn'
title = '我的博客'

# 默认内容语言，对应 languages.toml 中定义的语言 key
defaultContentLanguage = "zh"

hasCJKLanguage = true
theme = "hugo-theme-stack"

# ===== 分页设置 =====
[pagination]
    pagerSize = 10    # 首页每页显示的文章数

# ===== 输出格式 =====
[outputFormats.json]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true

[outputs]
    page = ["HTML", "JSON"]

# ===== 永久链接格式 =====
[permalinks]
    post = "/p/:slug/"   # 文章 URL 变成 /p/文章标题/
    page = "/:slug/"     # 页面 URL 变成 /页面标题/